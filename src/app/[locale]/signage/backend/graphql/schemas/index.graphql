# --- Merged Query Type ---
type Query {
  # From device.schema.graphql
  getDevice(id: ID!): Device
  listDevices(organizationId: ID!): [Device!]!

  # From media.schema.graphql
  getMedia(id: ID!, organizationId: ID!): Media
  listMedia(organizationId: ID!): [Media!]!

  # From playlist.schema.graphql
  getPlaylist(id: ID!, organizationId: ID!): Playlist
  listPlaylists(organizationId: ID!): [Playlist!]!
  getPlaylistForDevice(deviceId: ID!): Playlist

  # From schedule.schema.graphql
  getScheduledEvent(id: ID!): ScheduledEvent
  listScheduledEvents(
    organizationId: ID!
    dateRangeStart: DateTime!
    dateRangeEnd: DateTime!
    targetIds: [ID!]
  ): [ScheduledEvent!]!
}

# --- Merged Mutation Type ---
type Mutation {
  # From device.schema.graphql
  generateDevicePairingCode(input: GenerateDevicePairingCodeInput!): PairingCodeResponse!
  pairSignageDevice(input: PairSignageDeviceInput!): DevicePairedResponse!
  assignPlaylistToDevice(input: AssignPlaylistToDeviceInput!): Device # Returns updated device

  # From media.schema.graphql
  uploadMedia(input: UploadMediaInput!): Media!

  # From playlist.schema.graphql
  createPlaylist(input: CreatePlaylistInput!): Playlist!
  addMediaToPlaylist(input: AddMediaToPlaylistInput!): Playlist! # Returns the updated playlist

  # From schedule.schema.graphql
  createScheduledEvent(input: CreateScheduledEventInput!): ScheduledEvent!
  updateScheduledEvent(id: ID!, input: UpdateScheduledEventInput!): ScheduledEvent!
  deleteScheduledEvent(id: ID!): ScheduledEvent
}
