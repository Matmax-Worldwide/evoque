# This file conceptually merges all feature-specific GraphQL schemas.
# In a real setup with tools like @graphql-tools/merge, you might just point to
# directories, and the tool handles merging. The type definitions for Device, Media,
# Playlist, ScheduledEvent, etc., are expected to be loaded from their respective
# .schema.graphql files.

