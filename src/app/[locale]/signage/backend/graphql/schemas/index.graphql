# --- Scalar Types (Assumed to be defined globally or via a base schema) ---
scalar DateTime
# scalar Json # If used for fields like deviceSpecificConfig or item_settings

# --- Enum Types (Defined in their respective schema files, e.g., device.schema.graphql, schedule.schema.graphql) ---
# These are typically automatically available when the schema files defining them are loaded.
